<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DERO Hive — Microphone access</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #262624; color: #faf9f5; font: 15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; }
      main { max-width: 420px; text-align: center; padding: 32px; }
      .mark { width: 56px; height: 56px; margin: 0 auto 16px; display: grid; place-items: center; border-radius: 14px; background: #d97757; color: #fff; font-size: 24px; font-weight: 800; }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { color: #b8b6b0; font-size: 13px; }
      #status { margin-top: 18px; font-weight: 600; }
      #status.ok { color: #a6d75a; }
      #status.err { color: #ff7e7e; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">H</div>
      <h1>Microphone access for voice dictation</h1>
      <p>Chrome will ask for microphone permission. Allow it once here, then return to the DERO Hive side panel — this tab closes automatically.</p>
      <div id="status">Requesting microphone…</div>
    </main>
    <script src="permission.js"></script>
  </body>
</html>
